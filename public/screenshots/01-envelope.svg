<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 660" width="320" height="660" role="img" aria-label="App screenshot placeholder  envelope screen">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5E6D3"/>
      <stop offset="100%" stop-color="#EDD9C2"/>
    </linearGradient>
    <linearGradient id="env1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAF1E2"/>
    </linearGradient>
  </defs>

  <rect width="320" height="660" fill="url(#bg1)"/>

  <!-- status bar -->
  <text x="24" y="34" font-family="ui-sans-serif, system-ui, -apple-system" font-size="13" font-weight="600" fill="#3D2E1F">9:41</text>
  <circle cx="276" cy="30" r="3" fill="#3D2E1F"/>
  <rect x="284" y="26" width="18" height="8" rx="2" fill="none" stroke="#3D2E1F" stroke-width="1.2"/>

  <!-- title -->
  <text x="160" y="92" text-anchor="middle" font-family="ui-serif, Georgia" font-size="22" font-style="italic" fill="#3D2E1F">a letter for you</text>
  <text x="160" y="116" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" fill="#6B5440">tap the envelope to open</text>

  <!-- envelope -->
  <g transform="translate(60 200)">
    <rect x="0" y="0" width="200" height="140" rx="6" fill="url(#env1)" stroke="#D9C7AE" stroke-width="2"/>
    <polyline points="0,0 100,80 200,0" fill="none" stroke="#D9C7AE" stroke-width="2"/>
    <polyline points="0,140 80,75 120,75 200,140" fill="none" stroke="#D9C7AE" stroke-width="1.5" opacity="0.7"/>
    <!-- wax seal -->
    <g transform="translate(100 80)">
      <circle r="22" fill="#B07A4A"/>
      <circle r="22" fill="none" stroke="#8E5F38" stroke-width="1.5" stroke-dasharray="2 3"/>
      <path d="M0 6 C -8 -2, -14 -10, -8 -14 C -2 -18, 0 -10, 0 -8 C 0 -10, 2 -18, 8 -14 C 14 -10, 8 -2, 0 6 Z" fill="#F5E6D3"/>
    </g>
  </g>

  <!-- floating hearts -->
  <g fill="#D9C7AE" opacity="0.7">
    <path transform="translate(48 168)" d="M0 4 C -5 -1, -9 -7, -5 -10 C -1 -13, 0 -7, 0 -5 C 0 -7, 1 -13, 5 -10 C 9 -7, 5 -1, 0 4 Z"/>
    <path transform="translate(272 178) scale(0.8)" d="M0 4 C -5 -1, -9 -7, -5 -10 C -1 -13, 0 -7, 0 -5 C 0 -7, 1 -13, 5 -10 C 9 -7, 5 -1, 0 4 Z"/>
    <path transform="translate(60 380) scale(0.7)" d="M0 4 C -5 -1, -9 -7, -5 -10 C -1 -13, 0 -7, 0 -5 C 0 -7, 1 -13, 5 -10 C 9 -7, 5 -1, 0 4 Z"/>
  </g>

  <!-- caption -->
  <text x="160" y="430" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="13" fill="#6B5440">card 3 of 12</text>

  <!-- progress dots -->
  <g transform="translate(112 460)">
    <circle cx="0"  cy="0" r="4" fill="#B07A4A"/>
    <circle cx="14" cy="0" r="4" fill="#B07A4A"/>
    <circle cx="28" cy="0" r="4" fill="#B07A4A"/>
    <circle cx="42" cy="0" r="4" fill="#D9C7AE"/>
    <circle cx="56" cy="0" r="4" fill="#D9C7AE"/>
    <circle cx="70" cy="0" r="4" fill="#D9C7AE"/>
    <circle cx="84" cy="0" r="4" fill="#D9C7AE"/>
  </g>

  <!-- bottom nav -->
  <rect x="20" y="580" width="280" height="56" rx="28" fill="#FFFFFF" stroke="#D9C7AE" stroke-width="1.5"/>
  <circle cx="70"  cy="608" r="6" fill="#B07A4A"/>
  <circle cx="160" cy="608" r="6" fill="#D9C7AE"/>
  <circle cx="250" cy="608" r="6" fill="#D9C7AE"/>
</svg>
